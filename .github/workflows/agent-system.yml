# Plumera Agent System - GitHub Actions Workflow
#
# Model Assignments:
# - CI Guardian: opencode/big-pickle (OpenCode)
# - Code Reviewer: gemini-3-flash (Google/Gemini API)
# - Frontend Specialist: opencode/minimax-m2.5-free (OpenCode)
# - Backend Specialist: nemotron-3-nano-30b-a3b (OpenRouter)
# - Business Logic: trinity-large-preview (OpenRouter)
# - Cost Optimizer: opencode/big-pickle (OpenCode)
# - UX/Product: opencode/minimax-m2.5-free (OpenCode)
# - Performance: gemini-3-flash (Google/Gemini API)
# - SEO: trinity-large-preview (OpenRouter)
# - Security: nemotron-3-nano-30b-a3b (OpenRouter)
# - Bug Hunter: opencode/gpt-5-nano (OpenCode)
#
# API Keys Required (GitHub Secrets):
# - OPENROUTER_API_KEY: For Nemotron, Trinity Large models
# - GEMINI_API_KEY: For Gemini 3 Flash model

name: Plumera Agent System

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

env:
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  check-tokens:
    runs-on: ubuntu-latest
    outputs:
      tokens_available: ${{ steps.check.outputs.available }}
      mode: ${{ steps.check.outputs.mode }}
    steps:
      - name: Check token availability
        id: check
        run: |
          echo "available=true" >> $GITHUB_OUTPUT
          echo "mode=full" >> $GITHUB_OUTPUT

  ci-guardian:
    needs: check-tokens
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Client deps
        run: cd client && npm ci --prefer-offline

      - name: Install Server deps
        run: cd server && npm ci --prefer-offline

      - name: Run Client Lint
        run: cd client && npm run lint

      - name: Run Client Build
        run: cd client && npm run build

      - name: Run Server Lint
        run: cd server && npm run lint

      - name: Run Server Build
        run: cd server && npm run build

  code-reviewer:
    needs: ci-guardian
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Code Review
        run: |
          echo "Code Reviewer Agent: Using gemini-3-flash (Google/Gemini API)"
          echo "See docs/agent-prompts/CODE_REVIEWER.md for full context"

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: "## Code Review (AI Agent)\n\n**Reviewer:** Code Reviewer Agent\n**Model:** gemini-3-flash (Google/Gemini API)\n\n### Analysis Scope\n- Code quality & conventions\n- Security vulnerabilities\n- Best practices\n- Bug detection\n\n### Note\nFor detailed analysis, run agents manually or check AGENTS.md.\n\n---\n*Plumera Agent System*"
            });

  frontend-specialist:
    needs: ci-guardian
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Frontend Specialist
        run: |
          echo "Frontend Specialist: Using opencode/minimax-m2.5-free (OpenCode)"
          echo "See docs/agent-prompts/FRONTEND_SPECIALIST.md"

  backend-specialist:
    needs: ci-guardian
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Backend Specialist
        run: |
          echo "Backend Specialist: Using nemotron-3-nano-30b-a3b (OpenRouter)"
          echo "See docs/agent-prompts/BACKEND_SPECIALIST.md"
